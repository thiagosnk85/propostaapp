<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOMAX · Redefinir Senha</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body class="auth-screen" style="display:flex">
  <div class="auth-card">
    <div class="auth-logo">
      <img src="img/logo.png" alt="SOMAX Ambiental e Acustica" class="brand-image">
    </div>
    <div class="auth-form">
      <h2 class="auth-title">Redefinir Senha</h2>
      <div class="form-group">
        <label>Nova senha</label>
        <input type="password" id="reset-pass" placeholder="Minimo 6 caracteres" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label>Confirmar senha</label>
        <input type="password" id="reset-pass-confirm" placeholder="Repita a senha" autocomplete="new-password">
      </div>
      <button class="btn btn-primary btn-full" id="reset-submit">Atualizar senha</button>
      <div id="reset-message" class="auth-switch" style="margin-top:12px"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script>
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON);
    const messageEl = document.getElementById('reset-message');

    function setMessage(message, isError = false) {
      messageEl.textContent = message;
      messageEl.style.color = isError ? '#ff4d6a' : '';
    }

    document.getElementById('reset-submit').addEventListener('click', async () => {
      const pass = document.getElementById('reset-pass').value;
      const confirm = document.getElementById('reset-pass-confirm').value;

      if (!pass || pass.length < 6) {
        setMessage('A senha deve ter pelo menos 6 caracteres.', true);
        return;
      }
      if (pass !== confirm) {
        setMessage('As senhas nao coincidem.', true);
        return;
      }

      const { error } = await db.auth.updateUser({ password: pass });
      if (error) {
        setMessage(error.message || 'Nao foi possivel atualizar a senha.', true);
        return;
      }

      setMessage('Senha atualizada. Voce ja pode voltar ao app e fazer login.');
      document.getElementById('reset-pass').value = '';
      document.getElementById('reset-pass-confirm').value = '';
    });
  </script>
</body>
</html>

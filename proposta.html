<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOMAX · Proposta Comercial</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <link rel="stylesheet" href="css/pdf.css">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Poppins',sans-serif;background:#f5f5fa;min-height:100vh;padding:40px 20px}
    .container{max-width:860px;margin:0 auto}
    .action-bar{background:#0d0d1a;border-radius:12px;padding:16px 24px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
    .action-bar-logo{font-family:'Poppins',sans-serif;font-size:20px;font-weight:800;letter-spacing:3px;color:#e8c547}
    .btn{padding:10px 22px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:6px;font-family:'Poppins',sans-serif;transition:all .2s}
    .btn-approve{background:#4dffb0;color:#0a0a0f}
    .btn-cancel{background:rgba(255,77,106,0.15);color:#ff4d6a;border:1px solid rgba(255,77,106,0.3)}
    .btn-download{background:rgba(232,197,71,0.15);color:#e8c547;border:1px solid rgba(232,197,71,0.3)}
    .status-box{border-radius:12px;padding:18px 24px;margin-bottom:24px;display:flex;align-items:center;gap:14px;font-weight:600;font-size:15px}
    .status-aprovada{background:#e6fff5;border:2px solid #4dffb0;color:#0a7a4a}
    .status-cancelada{background:#fff0f3;border:2px solid #ff4d6a;color:#c0002a}
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:none;align-items:center;justify-content:center}
    .modal-bg.open{display:flex}
    .modal{background:#fff;border-radius:16px;padding:30px;width:90%;max-width:440px;text-align:center}
    .modal h3{font-family:'Poppins',sans-serif;font-size:20px;font-weight:700;margin-bottom:12px}
    .modal p{color:#555;font-size:14px;margin-bottom:20px}
    .modal-btns{display:flex;gap:10px;justify-content:center}
    .pdf-document{border-radius:8px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.15)}
    .loading{text-align:center;padding:60px;color:#888;font-size:16px}
    @media(max-width:640px){.action-bar{flex-direction:column}.pdf-header{flex-direction:column;gap:16px}.pdf-client-grid,.pdf-conditions{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="container">
  <div class="action-bar">
    <div class="action-bar-logo">SOMAX</div>
    <div id="action-buttons" style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn btn-download" onclick="window.print()">⬇ Imprimir / PDF</button>
    </div>
  </div>

  <div id="status-display"></div>
  <div id="proposal-content" class="loading">Carregando proposta...</div>
</div>

<div class="modal-bg" id="modal-approve">
  <div class="modal">
    <h3>Aprovar Proposta</h3>
    <p>Ao confirmar, notificaremos a equipe SOMAX e sua proposta sera registrada como aprovada.</p>
    <div class="form-group" style="margin-bottom:16px;text-align:left">
      <label style="font-size:12px;color:#666;font-weight:600;text-transform:uppercase;letter-spacing:.5px">Seu nome</label>
      <input type="text" id="approve-name" placeholder="Nome completo" style="width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;margin-top:6px;font-family:'Poppins',sans-serif">
    </div>
    <div class="modal-btns">
      <button class="btn" style="background:#eee;color:#333" onclick="closeModal('approve')">Cancelar</button>
      <button class="btn btn-approve" onclick="confirmResponse('approve')">Confirmar aprovacao</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="modal-cancel">
  <div class="modal">
    <h3>Cancelar Proposta</h3>
    <p>Ao confirmar, a proposta sera marcada como cancelada.</p>
    <div class="form-group" style="margin-bottom:16px;text-align:left">
      <label style="font-size:12px;color:#666;font-weight:600;text-transform:uppercase;letter-spacing:.5px">Motivo (opcional)</label>
      <textarea id="cancel-reason" placeholder="Descreva o motivo..." style="width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;margin-top:6px;resize:vertical;min-height:80px;font-family:'Poppins',sans-serif"></textarea>
    </div>
    <div class="modal-btns">
      <button class="btn" style="background:#eee;color:#333" onclick="closeModal('cancel')">Voltar</button>
      <button class="btn btn-cancel" onclick="confirmResponse('cancel')">Confirmar cancelamento</button>
    </div>
  </div>
</div>

<script>
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON);

function fmtBRL(v){return new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v||0);}
function fmtDate(iso){if(!iso)return'-';return new Date(iso).toLocaleDateString('pt-BR');}
function escHtml(value){return String(value ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function closeModal(type){document.getElementById('modal-'+type).classList.remove('open');}

let _proposal = null;
let _token = null;

async function fetchPublicProposal(id, token){
  if (!token) {
    return { payload: null, mode: 'legacy-missing-token', error: null };
  }

  const { data, error } = await db.rpc('get_public_proposal', { p_id: id, p_token: token });
  if (!error && data?.proposal) return { payload: data, mode: 'token' };

  return { payload: null, mode: 'token', error };
}

async function load(){
  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  _token = params.get('token');
  if(!id){
    document.getElementById('proposal-content').innerHTML='<div class="loading">Link invalido.</div>';
    return;
  }

  const { payload, mode, error } = await fetchPublicProposal(id, _token);
  if(mode === 'legacy-missing-token'){
    document.getElementById('proposal-content').innerHTML='<div class="loading">Este link publico esta desatualizado. Gere um novo link da proposta com token.</div>';
    return;
  }

  if(error || !payload?.proposal){
    document.getElementById('proposal-content').innerHTML='<div class="loading">Proposta nao encontrada.</div>';
    return;
  }

  const p = payload.proposal;
  const itens = payload.items || [];
  const co = payload.company || null;
  p._items = itens.filter(i => i.tipo === 'item');
  p._alts = itens.filter(i => i.tipo === 'alternativa');
  _proposal = p;
  const mult = Number(p.bdi_mult || 1);

  const sd = document.getElementById('status-display');
  if(p.status === 'aprovada'){
    sd.innerHTML = `<div class="status-box status-aprovada">Esta proposta foi aprovada em ${fmtDate(p.approved_at)}.</div>`;
  } else if(p.status === 'cancelada'){
    sd.innerHTML = `<div class="status-box status-cancelada">Esta proposta foi cancelada.</div>`;
  } else {
    sd.innerHTML = '';
  }

  if(p.status === 'pendente' || p.status === 'enviada'){
    document.getElementById('action-buttons').innerHTML += `
      <button class="btn btn-approve" onclick="document.getElementById('modal-approve').classList.add('open')">Aprovar proposta</button>
      <button class="btn btn-cancel" onclick="document.getElementById('modal-cancel').classList.add('open')">Recusar</button>`;
  }

  const calcLine = (it) => {
    const qtd = Number(it.quantidade || 0);
    const unit = Number(it.preco_unit || 0) * mult;
    return { qtd, unit, total: qtd * unit };
  };
  const totalItems = p._items.reduce((s, it) => s + calcLine(it).total, 0);
  const totalAlts = p._alts.reduce((s, it) => s + calcLine(it).total, 0);
  const grandTotal = totalItems + totalAlts;
  const renderRows = (rows) => rows.map((it, i) => {
    const line = calcLine(it);
    return `<tr><td>${i+1}</td><td class="item-tag">${escHtml(it.tag || '-')}</td><td class="item-desc">${escHtml(it.descricao || '-')}</td><td style="text-align:center">${line.qtd}</td><td style="text-align:right">${fmtBRL(line.unit)}</td><td style="text-align:right;font-weight:600">${fmtBRL(line.total)}</td></tr>`;
  }).join('');

  document.getElementById('proposal-content').innerHTML = `
  <div class="pdf-document">
    <div class="pdf-header">
      <div>
        <div class="pdf-logo-name">SOMAX</div>
        <div class="pdf-logo-tagline">Sistemas de Ventilacao Industrial</div>
        <div class="pdf-logo-details">${co?.cnpj ? `CNPJ: ${escHtml(co.cnpj)}<br>` : ''}${escHtml(co?.endereco || '')}<br>${co?.telefone ? `Tel: ${escHtml(co.telefone)} · ` : ''}${escHtml(co?.email || '')}</div>
      </div>
      <div class="pdf-prop-info">
        <div class="pdf-prop-label">Proposta Comercial</div>
        <div class="pdf-prop-num">Nº ${escHtml(p.prop_number || '-')}</div>
        <div class="pdf-prop-meta">Data: ${fmtDate(p.created_at)}<br>${p.revisao ? `Rev. ${escHtml(p.revisao)}<br>` : ''}</div>
      </div>
    </div>
    <div class="pdf-accent-bar"></div>
    <div class="pdf-body">
      <div class="pdf-section">
        <div class="pdf-section-title">Dados do Cliente</div>
        <div class="pdf-client-grid">
          <div><div class="pdf-ci-label">Cliente</div><div class="pdf-ci-value">${escHtml(p.cliente || '-')}</div></div>
          ${p.attn ? `<div><div class="pdf-ci-label">A/C</div><div class="pdf-ci-value">${escHtml(p.attn)}</div></div>` : ''}
          ${p.cnpj_cliente ? `<div><div class="pdf-ci-label">CNPJ</div><div class="pdf-ci-value">${escHtml(p.cnpj_cliente)}</div></div>` : ''}
          ${p.email ? `<div><div class="pdf-ci-label">E-mail</div><div class="pdf-ci-value">${escHtml(p.email)}</div></div>` : ''}
        </div>
      </div>
      ${p._items.length ? `<div class="pdf-section"><div class="pdf-section-title">Escopo e Precos</div><table class="pdf-table"><thead><tr><th>#</th><th>Tag/Modelo</th><th>Descricao</th><th style="text-align:center">Qtd</th><th style="text-align:right">Unit.</th><th style="text-align:right">Total</th></tr></thead><tbody>${renderRows(p._items)}</tbody></table></div>` : ''}
      ${p._alts.length ? `<div class="pdf-section"><div class="pdf-section-title">Acessorios</div><table class="pdf-table"><thead><tr><th>#</th><th>Tag/Modelo</th><th>Descricao</th><th style="text-align:center">Qtd</th><th style="text-align:right">Unit.</th><th style="text-align:right">Total</th></tr></thead><tbody>${renderRows(p._alts)}</tbody></table><div class="pdf-total-row"><div class="pdf-total-box"><div><div class="pdf-total-label">Valor Total Geral</div><div class="pdf-total-value">${fmtBRL(grandTotal)}</div></div></div></div></div>` : ''}
      ${p._items.length && !p._alts.length ? `<div class="pdf-section"><div class="pdf-total-row"><div class="pdf-total-box"><div><div class="pdf-total-label">Valor Total Geral</div><div class="pdf-total-value">${fmtBRL(grandTotal)}</div></div></div></div></div>` : ''}
      <div class="pdf-section">
        <div class="pdf-section-title">Condicoes Comerciais</div>
        <div class="pdf-conditions">
          ${p.prazo_entrega ? `<div class="pdf-cond-item"><div class="pdf-cond-label">Prazo de Entrega</div><div class="pdf-cond-value">${escHtml(p.prazo_entrega)}</div></div>` : ''}
          ${p.cond_pagamento ? `<div class="pdf-cond-item"><div class="pdf-cond-label">Pagamento</div><div class="pdf-cond-value">${escHtml(p.cond_pagamento)}</div></div>` : ''}
          ${p.impostos ? `<div class="pdf-cond-item"><div class="pdf-cond-label">Impostos</div><div class="pdf-cond-value">${escHtml(p.impostos)}</div></div>` : ''}
          ${p.local_entrega ? `<div class="pdf-cond-item"><div class="pdf-cond-label">Local de Entrega</div><div class="pdf-cond-value">${escHtml(p.local_entrega)}</div></div>` : ''}
          ${p.validade_proposta ? `<div class="pdf-cond-item"><div class="pdf-cond-label">Validade</div><div class="pdf-cond-value">${escHtml(p.validade_proposta)}</div></div>` : ''}
          ${p.cond_gerais ? `<div class="pdf-cond-item" style="grid-column:1/-1"><div class="pdf-cond-label">Condicoes Gerais</div><div class="pdf-cond-value">${escHtml(p.cond_gerais)}</div></div>` : ''}
        </div>
      </div>
      ${p.observacoes ? `<div class="pdf-section"><div class="pdf-section-title">Observacoes</div><div class="pdf-obs-box">${escHtml(p.observacoes)}</div></div>` : ''}
    </div>
    <div class="pdf-footer">
      <div class="pdf-footer-left"><strong>${escHtml(co?.nome || 'SOMAX')}</strong><br>${escHtml(co?.telefone || '')}</div>
      <div class="pdf-footer-right">Proposta Nº ${escHtml(p.prop_number || '-')}<br>Documento Confidencial</div>
    </div>
  </div>`;
}

async function confirmResponse(type){
  if(!_proposal || !_token) return;
  let action = '';
  let note = '';
  let name = '';

  if(type === 'approve'){
    name = document.getElementById('approve-name').value.trim();
    if(!name){alert('Informe seu nome para confirmar.');return;}
    action = 'approve';
    note = `Aprovado por: ${name}`;
  } else {
    action = 'cancel';
    const reason = document.getElementById('cancel-reason').value.trim();
    note = reason ? `Motivo: ${reason}` : '';
  }

  const { data, error } = await db.rpc('respond_to_proposal', {
    p_id: _proposal.id,
    p_token: _token,
    p_action: action,
    p_name: name || null,
    p_note: note || null
  });

  if(error || !data?.success){
    alert(data?.message || error?.message || 'Nao foi possivel registrar sua resposta.');
    return;
  }

  closeModal(type);
  location.reload();
}

load();
</script>
</body>
</html>
